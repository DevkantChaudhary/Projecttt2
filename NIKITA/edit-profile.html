<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Fresh Field Grocery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">🌿 Fresh Field Grocery</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li id="nav-auth"></li>
            </ul>
        </div>
    </nav>

    <main class="container auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-form">
                <h1>Edit Profile</h1>
                <p class="auth-subtitle">Update your account information</p>

                <form id="editProfileForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Current Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password to confirm changes">
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="profile.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>

                <div class="auth-message" id="authMessage"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Fresh Field Grocery. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthentication('edit-profile.html');
            loadEditProfile();
            document.getElementById('editProfileForm').addEventListener('submit', handleEditProfile);
        });
    </script>
</body>
</html>
