<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Fresh Field Grocery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">🌿 Fresh Field Grocery</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li id="nav-auth"></li>
            </ul>
        </div>
    </nav>

    <main class="container profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h1 id="profileName">User Name</h1>
                <p class="profile-subtitle">Fresh Field Member</p>
            </div>

            <div class="profile-info">
                <div class="info-section">
                    <h2>Account Information</h2>
                    <div class="info-item">
                        <label>Name:</label>
                        <p id="nameDisplay">John Doe</p>
                    </div>
                    <div class="info-item">
                        <label>Email:</label>
                        <p id="emailDisplay">john@example.com</p>
                    </div>
                    <div class="info-item">
                        <label>Member Since:</label>
                        <p id="memberSince">January 2024</p>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="edit-profile.html" class="btn btn-primary">Edit Profile</a>
                    <button id="logoutBtn" class="btn btn-danger">Logout</button>
                </div>
            </div>
        </div>

        <div class="additional-info">
            <h2>Quick Stats</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Orders Placed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Total Spent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Favorite Items</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Fresh Field Grocery. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthentication('profile.html');
            loadProfile();
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
        });
    </script>
</body>
</html>
