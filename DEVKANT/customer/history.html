<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History & Payments</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Order History & Payments</h1>
        <nav>
            <a href="../index.html">Home</a>
        </nav>
    </header>
    <main>
        <h2>Your Order History</h2>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Products</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Payment Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>Payment History</h2>
        <table id="paymentsTable">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>
    <script src="../js/app.js"></script>
    <script>
        const users = getFromStorage('users');
        const customer = users.find(u => u.role === 'customer');
        const orders = getFromStorage('orders').filter(o => o.userId === customer.id);

        function renderHistory() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = '';
            orders.forEach(order => {
                const productsStr = order.products.map(p => `${p.id} (x${p.quantity})`).join(', ');
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${productsStr}</td>
                    <td>${order.total}</td>
                    <td>${order.status}</td>
                    <td>${order.paymentStatus || 'Pending'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderPayments() {
            const tbody = document.querySelector('#paymentsTable tbody');
            tbody.innerHTML = '';
            orders.filter(o => o.paymentStatus === 'Paid').forEach(order => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.total}</td>
                    <td>${order.paymentStatus}</td>
                    <td>${order.paymentDate || 'N/A'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        renderHistory();
        renderPayments();
    </script>
</body>
</html>
