<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Enquiries</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Feedback & Enquiries</h1>
        <nav>
            <a href="../index.html">Home</a>
        </nav>
    </header>
    <main>
        <h2>Send Feedback or Enquiry</h2>
        <form id="feedbackForm">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" required>

            <label for="message">Message:</label>
            <textarea id="message" required></textarea>

            <button type="submit">Send</button>
        </form>

        <h3>Your Previous Feedback</h3>
        <ul id="feedbackList"></ul>
    </main>
    <script src="../js/app.js"></script>
    <script>
        const users = getFromStorage('users');
        const customer = users.find(u => u.role === 'customer');
        let feedbacks = getFromStorage('feedbacks') || [];

        function renderFeedbacks() {
            const feedbackList = document.getElementById('feedbackList');
            feedbackList.innerHTML = '';
            feedbacks.filter(f => f.userId === customer.id).forEach(feedback => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${feedback.subject}</strong>: ${feedback.message} (${feedback.date})`;
                feedbackList.appendChild(li);
            });
        }

        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            const newFeedback = {
                id: generateId(),
                userId: customer.id,
                subject,
                message,
                date: new Date().toLocaleString()
            };
            feedbacks.push(newFeedback);
            saveToStorage('feedbacks', feedbacks);
            renderFeedbacks();
            this.reset();
            alert('Feedback sent successfully!');
        });

        renderFeedbacks();
    </script>
</body>
</html>
