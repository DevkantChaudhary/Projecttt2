<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Product Management</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Product Management</h1>
        <nav>
            <a href="../index.html">Home</a>
        </nav>
    </header>
    <main>
        <h2>All Products</h2>
        <table id="productsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Add New Product</h3>
        <form id="addProductForm">
            <label for="productName">Name:</label>
            <input type="text" id="productName" required>

            <label for="productPrice">Price:</label>
            <input type="number" id="productPrice" step="0.01" required>

            <label for="productDesc">Description:</label>
            <input type="text" id="productDesc" required>

            <button type="submit">Add Product</button>
        </form>

        <div id="editForm" class="hidden">
            <h3>Edit Product</h3>
            <form id="editProductForm">
                <input type="hidden" id="editId">
                <label for="editName">Name:</label>
                <input type="text" id="editName" required>

                <label for="editPrice">Price:</label>
                <input type="number" id="editPrice" step="0.01" required>

                <label for="editDesc">Description:</label>
                <input type="text" id="editDesc" required>

                <button type="submit">Update Product</button>
                <button type="button" id="cancelEdit">Cancel</button>
            </form>
        </div>
    </main>
    <script src="../js/app.js"></script>
    <script>
        function renderProducts() {
            const products = getFromStorage('products');
            const tbody = document.querySelector('#productsTable tbody');
            tbody.innerHTML = '';
            products.forEach(product => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.price}</td>
                    <td>${product.description}</td>
                    <td>
                        <button onclick="editProduct('${product.id}')">Edit</button>
                        <button onclick="deleteProduct('${product.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editProduct(id) {
            const products = getFromStorage('products');
            const product = products.find(p => p.id === id);
            if (product) {
                document.getElementById('editId').value = product.id;
                document.getElementById('editName').value = product.name;
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editDesc').value = product.description;
                document.getElementById('editForm').classList.remove('hidden');
            }
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                let products = getFromStorage('products');
                products = products.filter(p => p.id !== id);
                saveToStorage('products', products);
                renderProducts();
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDesc').value;

            const products = getFromStorage('products');
            const newProduct = {
                id: generateId(),
                name,
                price,
                description
            };
            products.push(newProduct);
            saveToStorage('products', products);
            renderProducts();
            this.reset();
        });

        document.getElementById('editProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value;
            const price = parseFloat(document.getElementById('editPrice').value);
            const description = document.getElementById('editDesc').value;

            let products = getFromStorage('products');
            const index = products.findIndex(p => p.id === id);
            if (index !== -1) {
                products[index] = { id, name, price, description };
                saveToStorage('products', products);
                renderProducts();
                document.getElementById('editForm').classList.add('hidden');
            }
        });

        document.getElementById('cancelEdit').addEventListener('click', function() {
            document.getElementById('editForm').classList.add('hidden');
        });

        renderProducts();
    </script>
</body>
</html>
